services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      PORT: 3000
      FRONTEND_DIST_PATH: /app/frontend
      UPLOADS_DIR: /app/uploads
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
