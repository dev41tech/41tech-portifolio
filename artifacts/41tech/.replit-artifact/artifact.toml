kind = "web"
previewPath = "/"
title = "41 Tech"
version = "1.0.0"
id = "artifacts/41tech"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19871

[services.development]
run = "pnpm --filter @workspace/41tech run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/41tech", "run", "build" ]
publicDir = "artifacts/41tech/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19871"
BASE_PATH = "/"
